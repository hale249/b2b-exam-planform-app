name: Release

# Tag PREFIX selects the environment, mapped to a Repository Secret holding
# that env's .env (Settings > Secrets and variables > Actions):
#   dev_v1.0.0  -> ENV_FILE_DEV   (branch develop)
#   stg_v1.0.0  -> ENV_FILE_STG   (branch staging)
#   v1.0.0      -> ENV_FILE_PROD  (branch main)
# (Repository secrets are used instead of GitHub Environments, which are not
#  available on private repos without a paid plan.)
# Builds mac + windows + linux and publishes a GitHub Release for the tag.
# The app version is taken FROM THE TAG (e.g. v1.2.0 / dev_v1.2.0 -> 1.2.0),
# overriding package.json at build time — no need to bump package.json.
on:
  push:
    tags:
      - "v*"
      - "stg_v*"
      - "dev_v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            eb_flag: "--mac"
          - os: windows-latest
            platform: win
            eb_flag: "--win"
          - os: ubuntu-latest
            platform: linux
            eb_flag: "--linux"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Electron runtime libs (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libgbm1 libgtk-3-0 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2 \
            libasound2t64 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libatspi2.0-0t64 \
          || sudo apt-get install -y \
            libnss3 libnspr4 libgbm1 libgtk-3-0 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2 \
            libasound2 libatk1.0-0 libatk-bridge2.0-0 libcups2 libatspi2.0-0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup Node.js
        # Node 22: Electron 42's extract-zip@2.0.1 crashes on Node 24 (mac/win).
        # Node only orchestrates; bytecode is compiled by Electron's own V8.
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#dev_}"
          version="${version#stg_}"
          version="${version#v}"
          echo "Tag $tag -> version $version"
          npm pkg set version="$version"

      - name: Create .env
        shell: bash
        env:
          ENV_FILE_CONTENT: ${{ startsWith(github.ref_name, 'dev_') && secrets.ENV_FILE_DEV || startsWith(github.ref_name, 'stg_') && secrets.ENV_FILE_STG || secrets.ENV_FILE_PROD }}
        run: |
          if [ -n "$ENV_FILE_CONTENT" ]; then
            printf '%s' "$ENV_FILE_CONTENT" > .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vite build
        run: pnpm run build

      - name: Compile bytecode
        run: pnpm run bytecode
        env:
          ELECTRON_RUN_AS_NODE: "1"

      - name: Build & publish to GitHub Release
        run: pnpm exec electron-builder ${{ matrix.eb_flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
