stages:
  - validate
  - build
  - publish
  - verify
  - release

variables:
  VERSION: "${CI_COMMIT_TAG}"
  APP_NAME: "prepedu-exam-platform"
  GCS_BUCKET: "local-dev"
  GCS_BASE_URL: "https://storage.googleapis.com/${GCS_BUCKET}"
  PUBLISH_TO_GCS: "false"

.setup_pnpm: &setup_pnpm
  - corepack enable
  - corepack prepare pnpm@10.26.1 --activate
  - pnpm config set store-dir .pnpm-store

.pnpm_cache: &pnpm_cache
  key:
    files: [pnpm-lock.yaml]
  paths: [.pnpm-store]

.on_tag: &on_tag
  rules:
    - if: '$CI_COMMIT_TAG =~ /^dev_\d+\.\d+\.\d+/'
      variables:
        TARGET_ENV: "dev"
        UPDATE_CHANNEL: "dev"
    - if: '$CI_COMMIT_TAG =~ /^stg_\d+\.\d+\.\d+/'
      variables:
        TARGET_ENV: "staging"
        UPDATE_CHANNEL: "stg"
    - if: '$CI_COMMIT_TAG =~ /^live_\d+\.\d+\.\d+/'
      variables:
        TARGET_ENV: "main"
        UPDATE_CHANNEL: "latest"

.on_tag_publish: &on_tag_publish
  rules:
    - if: '($CI_COMMIT_TAG =~ /^dev_\d+\.\d+\.\d+/ || $CI_COMMIT_TAG =~ /^stg_\d+\.\d+\.\d+/ || $CI_COMMIT_TAG =~ /^live_\d+\.\d+\.\d+/) && $PUBLISH_TO_GCS == "true"'

lint-and-typecheck:
  stage: validate
  image: node:24-bookworm
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
  cache: *pnpm_cache
  before_script: *setup_pnpm
  script:
    - pnpm install --frozen-lockfile
    - pnpm run lint
    - pnpm run typecheck

build:linux:
  <<: *on_tag
  stage: build
  image: electronuserland/builder:latest
  environment:
    name: $TARGET_ENV
  cache: *pnpm_cache
  before_script: *setup_pnpm
  script:
    - cp "$ENV_FILE" .env
    - pnpm install --frozen-lockfile
    - pnpm run build:linux
  artifacts:
    paths:
      - dist/*.AppImage
      - dist/*.blockmap
      - dist/latest-linux.yml
    expire_in: 1 week

build:windows:
  <<: *on_tag
  stage: build
  tags: [saas-windows-medium-amd64]
  environment:
    name: $TARGET_ENV
  before_script: *setup_pnpm
  script:
    - Copy-Item $env:ENV_FILE .env
    - pnpm install --frozen-lockfile
    - pnpm run build:win
  artifacts:
    paths:
      - dist/*-setup.exe
      - dist/*.blockmap
      - dist/latest.yml
    expire_in: 1 week

build:mac:
  <<: *on_tag
  stage: build
  tags: [saas-macos-medium-m1]
  environment:
    name: $TARGET_ENV
  before_script: *setup_pnpm
  script:
    - cp "$ENV_FILE" .env
    - pnpm install --frozen-lockfile
    - pnpm run build:mac
  artifacts:
    paths:
      - dist/*.dmg
      - dist/*.zip
      - dist/*.blockmap
      - dist/latest-mac.yml
    expire_in: 1 week

publish:gcs:
  <<: *on_tag_publish
  stage: publish
  image: google/cloud-sdk:slim
  needs:
    - build:linux
    - build:windows
    - build:mac
  script:
    - gcloud auth activate-service-account --key-file="$GCP_SA_KEY"
    - |
      put() {
        local cc="$1"; shift
        for f in "$@"; do
          [ -e "$f" ] || continue
          echo ">> upload $f"
          gcloud storage cp "$f" "gs://$GCS_BUCKET/" --cache-control="$cc"
        done
      }
      put "public,max-age=31536000" dist/*-setup.exe dist/*.dmg dist/*.AppImage dist/*.zip dist/*.blockmap
      put "no-cache" dist/latest.yml dist/latest-mac.yml dist/latest-linux.yml

verify:manifests:
  <<: *on_tag_publish
  stage: verify
  image: alpine:3.20
  script:
    - apk add --no-cache curl
    - |
      check() {
        local yml="$1"
        echo ">> Checking ${yml}"
        curl -fsSL "${GCS_BASE_URL}/${yml}" -o "${yml}" || { echo "Missing ${yml} on GCS"; exit 1; }
        local file
        file=$(grep -E '^path:' "${yml}" | head -n1 | awk '{print $2}' | tr -d '\r')
        echo "   points to: ${file}"
        curl -fsI "${GCS_BASE_URL}/${file}" > /dev/null || { echo "Installer ${file} does NOT exist"; exit 1; }
        echo "   OK"
      }
      check "latest.yml"
      check "latest-mac.yml"
      check "latest-linux.yml"

release:gitlab:
  <<: *on_tag_publish
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Prep Exam Platform $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG. Download via the links below (hosted on Google Cloud Storage)."
    assets:
      links:
        - name: "Windows (.exe)"
          url: "${GCS_BASE_URL}/${APP_NAME}-${VERSION}-setup.exe"
          link_type: "package"
        - name: "macOS â€” Apple Silicon (.dmg)"
          url: "${GCS_BASE_URL}/${APP_NAME}-${VERSION}-arm64.dmg"
          link_type: "package"
        - name: "macOS â€” Intel (.dmg)"
          url: "${GCS_BASE_URL}/${APP_NAME}-${VERSION}-x64.dmg"
          link_type: "package"
        - name: "Linux (.AppImage)"
          url: "${GCS_BASE_URL}/${APP_NAME}-${VERSION}.AppImage"
          link_type: "package"
